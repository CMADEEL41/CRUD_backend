<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUD App</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f0f8ff;
        margin: 0; padding: 0;
    }
    .container {
        max-width: 800px;
        margin: 40px auto;
        background: #fff;
        padding: 20px 30px;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    h1 { text-align: center; color: #0077b6; }
    input, button { padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
    button { background: #0077b6; color: #fff; border: none; cursor: pointer; }
    button:hover { background: #0096c7; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
    th { background: #0077b6; color: #fff; }
    .actions button { margin-right: 5px; background: #023e8a; }
    .actions button.delete { background: #d00000; }
</style>
</head>
<body>

<div class="container">
    <h1>CRUD Users</h1>
    
    <div>
        <input type="hidden" id="userId">
        <input type="text" id="name" placeholder="Name">
        <input type="email" id="email" placeholder="Email">
        <input type="number" id="age" placeholder="Age">
        <button onclick="createOrUpdateUser()">Save User</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th><th>Email</th><th>Age</th><th>Actions</th>
            </tr>
        </thead>
        <tbody id="userTable"></tbody>
    </table>
</div>

<script>
const apiUrl = "http://localhost:5000/api/users"; 

// Fetch and display all users
async function fetchUsers() {
    const res = await fetch(apiUrl);
    const users = await res.json();
    const tbody = document.getElementById("userTable");
    tbody.innerHTML = "";
    users.forEach(user => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${user.name}</td>
            <td>${user.email}</td>
            <td>${user.age || ''}</td>
            <td class="actions">
                <button onclick="editUser('${user._id}')">Edit</button>
                <button class="delete" onclick="deleteUser('${user._id}')">Delete</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

// Create or Update user
async function createOrUpdateUser() {
    const id = document.getElementById("userId").value;
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const age = document.getElementById("age").value;

    if(!name || !email) { alert("Name & Email required"); return; }

    const userData = { name, email, age: age ? Number(age) : undefined };

    if(id) {
        // Update
        await fetch(`${apiUrl}/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(userData)
        });
    } else {
        // Create
        await fetch(apiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(userData)
        });
    }

    clearForm();
    fetchUsers();
}

// Load user data in form for editing
async function editUser(id) {
    const res = await fetch(`${apiUrl}/${id}`);
    const user = await res.json();
    document.getElementById("userId").value = user._id;
    document.getElementById("name").value = user.name;
    document.getElementById("email").value = user.email;
    document.getElementById("age").value = user.age || '';
}

// Delete user
async function deleteUser(id) {
    if(confirm("Are you sure you want to delete this user?")) {
        await fetch(`${apiUrl}/${id}`, { method: "DELETE" });
        fetchUsers();
    }
}

// Clear form
function clearForm() {
    document.getElementById("userId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("age").value = "";
}

// Initial fetch
fetchUsers();
</script>

</body>
</html>
